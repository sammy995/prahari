name: Release

# Publishes the workspace packages to npm on a version tag (e.g. `git tag v0.2.0 && git push --tags`).
# Requires an NPM_TOKEN repository secret (an npm automation token with publish rights).
# Each package publishes only if its current version is not already on npm, so
# re-running or tagging with an unchanged package is a no-op rather than a failure.

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Publish changed packages (dependency order)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -e
          for pkg in rbi-tiering crosswalk mrm; do
            name=$(node -p "require('./packages/$pkg/package.json').name")
            version=$(node -p "require('./packages/$pkg/package.json').version")
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "$name@$version already on npm — skipping."
            else
              echo "Publishing $name@$version"
              npm publish -w "packages/$pkg" --access public
            fi
          done

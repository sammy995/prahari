<svg xmlns="http://www.w3.org/2000/svg" width="760" height="316" viewBox="0 0 760 316" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">
  <defs>
    <style>
      .t { fill: #c9d1d9; }
      .dim { fill: #8b949e; }
      .crit { fill: #f85149; font-weight: 700; }
      .ok { fill: #3fb950; }
      .para { fill: #58a6ff; }
      .cmd { fill: #c9d1d9; }
      .prompt { fill: #3fb950; }
    </style>
  </defs>

  <!-- window -->
  <rect x="0.5" y="0.5" width="759" height="315" rx="10" fill="#0d1117" stroke="#30363d"/>
  <!-- title bar -->
  <rect x="0.5" y="0.5" width="759" height="38" rx="10" fill="#161b22"/>
  <rect x="0.5" y="20" width="759" height="19" fill="#161b22"/>
  <circle cx="22" cy="19" r="6" fill="#ff5f56"/>
  <circle cx="42" cy="19" r="6" fill="#ffbd2e"/>
  <circle cx="62" cy="19" r="6" fill="#27c93f"/>
  <text x="380" y="24" text-anchor="middle" class="dim" font-size="12">prahari — RBI Model Risk Management</text>

  <!-- body -->
  <text x="24" y="72"><tspan class="prompt">$ </tspan><tspan class="cmd">prahari check --file examples/fraud-detection/inventory.json</tspan></text>

  <text x="24" y="108"><tspan class="crit">[CRITICAL]</tspan><tspan class="t"> VALIDATION_REPORT_OVERDUE </tspan><tspan class="para">(RBI Para 33)</tspan></text>
  <text x="48" y="132" class="t">Real-time Transaction Fraud Model</text>
  <text x="48" y="156" class="dim">Validation report not placed before the RMCB within three months.</text>

  <text x="24" y="192"><tspan class="dim">exit code: </tspan><tspan class="crit">1</tspan><tspan class="dim">   ✗  release blocked in CI</tspan></text>

  <text x="24" y="240"><tspan class="prompt">$ </tspan><tspan class="cmd">prahari report --org "Demo Bank — Fraud Detection"</tspan></text>
  <text x="24" y="264"><tspan class="ok">✓</tspan><tspan class="t"> Examiner-ready report written · 4 models · </tspan><tspan class="dim">high=2 medium=2</tspan></text>
  <text x="24" y="288" class="dim">Regulation → Control → Evidence → Audit, in one local-first file.</text>
</svg>
